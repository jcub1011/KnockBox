name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version label for the release (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  publish:
    name: Publish ${{ matrix.rid }} (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
        mode: [self-contained, framework-dependent]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version label
        id: version
        run: echo "label=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore KnockBox/KnockBox.csproj -r ${{ matrix.rid }}

      - name: Publish host
        run: |
          if [ "${{ matrix.mode }}" = "self-contained" ]; then
            SELF_CONTAINED=true
          else
            SELF_CONTAINED=false
          fi
          dotnet publish KnockBox/KnockBox.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --no-restore \
            --self-contained $SELF_CONTAINED \
            -p:PublishSingleFile=false \
            -p:UseAppHost=true \
            -o publish/${{ matrix.rid }}-${{ matrix.mode }}

      - name: Verify plugins in publish output
        run: |
          PUBLISH_DIR="publish/${{ matrix.rid }}-${{ matrix.mode }}"
          if [ ! -d "$PUBLISH_DIR/games" ]; then
            echo "ERROR: games/ folder missing from publish output"
            exit 1
          fi
          GAME_COUNT=$(find "$PUBLISH_DIR/games" -mindepth 1 -maxdepth 1 -type d | wc -l)
          echo "Found $GAME_COUNT plugin folder(s) in $PUBLISH_DIR/games:"
          ls -1 "$PUBLISH_DIR/games"
          if [ "$GAME_COUNT" -lt 1 ]; then
            echo "ERROR: no plugins published"
            exit 1
          fi

      - name: Create archive
        id: archive
        run: |
          ARCHIVE_NAME="knockbox-${{ steps.version.outputs.label }}-${{ matrix.rid }}-${{ matrix.mode }}.zip"
          cd publish/${{ matrix.rid }}-${{ matrix.mode }}
          zip -r "../../$ARCHIVE_NAME" .
          cd ../..
          echo "name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knockbox-${{ matrix.rid }}-${{ matrix.mode }}
          path: ${{ steps.archive.outputs.name }}
          if-no-files-found: error
          retention-days: 7

  pack-core:
    name: Pack & Publish KnockBox.Core
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version label
        id: version
        run: |
          LABEL="${{ inputs.tag }}"
          # Strip 'v' prefix for NuGet if present
          CLEAN_LABEL="${LABEL#v}"
          echo "label=$CLEAN_LABEL" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack KnockBox.Core/KnockBox.Core.csproj -c Release -p:PackageVersion=${{ steps.version.outputs.label }} -o nupkg

      - name: NuGet Login
        id: oidc
        if: github.event_name == 'workflow_dispatch'
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish to NuGet.org
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Note: This step uses NuGet.org Trusted Publishing (OIDC).
          # The repository must be configured as a Trusted Publisher on NuGet.org.
          dotnet nuget push nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.oidc.outputs.NUGET_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knockbox-core-nupkg
          path: nupkg/*.nupkg

  pack-platform:
    name: Pack & Publish KnockBox.Platform
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version label
        id: version
        run: |
          LABEL="${{ inputs.tag }}"
          CLEAN_LABEL="${LABEL#v}"
          echo "label=$CLEAN_LABEL" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack KnockBox.Platform/KnockBox.Platform.csproj -c Release -p:PackageVersion=${{ steps.version.outputs.label }} -o nupkg

      - name: NuGet Login
        id: oidc
        if: github.event_name == 'workflow_dispatch'
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish to NuGet.org
        if: github.event_name == 'workflow_dispatch'
        run: |
          dotnet nuget push nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.oidc.outputs.NUGET_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knockbox-platform-nupkg
          path: nupkg/*.nupkg

  pack-templates:
    name: Pack & Publish KnockBox.Templates
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version label
        id: version
        run: |
          LABEL="${{ inputs.tag }}"
          CLEAN_LABEL="${LABEL#v}"
          echo "label=$CLEAN_LABEL" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack KnockBox.Templates/KnockBox.Templates.csproj -c Release -p:PackageVersion=${{ steps.version.outputs.label }} -o nupkg

      - name: NuGet Login
        id: oidc
        if: github.event_name == 'workflow_dispatch'
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish to NuGet.org
        if: github.event_name == 'workflow_dispatch'
        run: |
          dotnet nuget push nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.oidc.outputs.NUGET_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knockbox-templates-nupkg
          path: nupkg/*.nupkg

  release:
    name: Publish GitHub Release
    needs: [publish, pack-core, pack-platform, pack-templates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all publish artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: knockbox-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.tag }}
          tag_name: ${{ inputs.tag }}
          files: |
            artifacts/*.zip
            artifacts/*.nupkg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.tag, '-') }}
