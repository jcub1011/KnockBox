name: Release Host

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Host release tag (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  publish:
    name: Publish ${{ matrix.rid }} (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
        mode: [self-contained, framework-dependent]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version label
        id: version
        run: echo "label=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore host/KnockBox/KnockBox.csproj -r ${{ matrix.rid }}

      - name: Publish host
        run: |
          if [ "${{ matrix.mode }}" = "self-contained" ]; then
            SELF_CONTAINED=true
          else
            SELF_CONTAINED=false
          fi
          dotnet publish host/KnockBox/KnockBox.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --no-restore \
            --self-contained $SELF_CONTAINED \
            -p:PublishSingleFile=false \
            -p:UseAppHost=true \
            -o publish/${{ matrix.rid }}-${{ matrix.mode }}

      - name: Verify plugins in publish output
        run: |
          PUBLISH_DIR="publish/${{ matrix.rid }}-${{ matrix.mode }}"
          if [ ! -d "$PUBLISH_DIR/games" ]; then
            echo "ERROR: games/ folder missing from publish output"
            exit 1
          fi
          GAME_COUNT=$(find "$PUBLISH_DIR/games" -mindepth 1 -maxdepth 1 -type d | wc -l)
          echo "Found $GAME_COUNT plugin folder(s) in $PUBLISH_DIR/games:"
          ls -1 "$PUBLISH_DIR/games"
          if [ "$GAME_COUNT" -lt 1 ]; then
            echo "ERROR: no plugins published"
            exit 1
          fi

      - name: Create archive
        id: archive
        run: |
          ARCHIVE_NAME="knockbox-${{ steps.version.outputs.label }}-${{ matrix.rid }}-${{ matrix.mode }}.zip"
          cd publish/${{ matrix.rid }}-${{ matrix.mode }}
          zip -r "../../$ARCHIVE_NAME" .
          cd ../..
          echo "name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knockbox-${{ matrix.rid }}-${{ matrix.mode }}
          path: ${{ steps.archive.outputs.name }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release (Host)
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for tag lookup)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous host tag
        id: prev
        run: |
          PREV=$(git tag --list 'v*' --sort=-v:refname | grep -v "${{ inputs.tag }}" | head -n1)
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Download all publish artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: knockbox-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.tag }}
          tag_name: ${{ inputs.tag }}
          previous_tag: ${{ steps.prev.outputs.tag }}
          files: |
            artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.tag, '-') }}
